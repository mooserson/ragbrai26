name = "ragbrai-stats"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Public, non-secret config — committed to the repo.
[vars]
STRAVA_CLIENT_ID = "227538"
STRAVA_CLUB_ID = "2081067"
ALLOWED_ORIGIN = "https://paulcathey.com"
# REDIRECT_URI: filled in after first `wrangler deploy` prints your *.workers.dev URL.
# Set to "<workers-url>/callback".
REDIRECT_URI = "https://ragbrai-stats.pmcathey.workers.dev/callback"
# Club ride totals from before the accumulating counter went live. Strava's club
# feed only exposes a rolling recent window, so miles that aged out before this
# can't be re-fetched — seed them here and the live counter grows from these.
# Set to today's true totals when you deploy; adjust anytime (added on top of the
# live count, so changing them never disturbs the accumulator).
STATS_BASELINE_MILES = "0"
STATS_BASELINE_RIDES = "0"

# Secrets — set via `wrangler secret put <NAME>` (never committed):
#   STRAVA_CLIENT_SECRET — from strava.com/settings/api
#   BEACON_TOKEN — shared secret the phone sends with POST /location

# KV namespace — create with `wrangler kv:namespace create RAGBRAI_KV`,
# then paste the printed id below.
[[kv_namespaces]]
binding = "RAGBRAI_KV"
id = "ada3090fbcc04e658157742ffd768bdf"

# Refresh stats every 15 minutes (96 fires/day; well under Strava's
# 1000/day and Cloudflare's 100k req/day free quotas).
[triggers]
crons = ["*/15 * * * *"]
